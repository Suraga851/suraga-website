services:
  - type: web
    name: suraga-verification-api
    runtime: rust
    plan: free
    region: frankfurt
    buildCommand: cargo build --release --bin verification-api
    startCommand: ./target/release/verification-api
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: RUST_LOG
        value: actix_web=info
      - key: ALLOWED_ORIGINS
        value: https://suraga-website.vercel.app,http://127.0.0.1:8080,http://localhost:8080
      - key: DATABASE_URL
        value: ./verification.db
