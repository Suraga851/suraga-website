databases:
  - name: suraga-website-db
    plan: free
    region: frankfurt
    databaseName: suraga_website

services:
  - type: web
    name: suraga-website
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://suraga-website.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: suraga-website-db
          property: connectionString
